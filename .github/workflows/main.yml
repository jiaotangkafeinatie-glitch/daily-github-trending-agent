name: GitHub-Agent-Auto-Run

on:
  schedule:
    # 这里的 cron 表达式代表 UTC 时间 0:00，即北京时间早上 8:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 这个很重要，能让你手动点击运行来测试

jobs:
  run-it:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 拉取代码
        uses: actions/checkout@v3

      - name: 🐍 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 安装依赖库
        run: |
          pip install requests openai

      - name: 🤖 执行智能体
        env:
          # 从保险箱里把钥匙拿出来，给 Python 程序用
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          DINGTALK_URL: ${{ secrets.DINGTALK_URL }}
        run: python github_agent_v2.py
